<!DOCTYPE html>
<html>
<head><title>Jaribu Login</title></head>
<body>
<h2>Jaribu Kuingia</h2>
<input type="text" id="user" placeholder="admin"><br>
<input type="password" id="pass" placeholder="admin123"><br>
<button onclick="login()">Ingia</button>
<div id="result"></div>

<script>
// Badilisha hii iwe URL yako HALISI ya web app baada ya ku deploy
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw--zYEdUnBzYev7RtR_wQ3AP68K-cxDMxf99L0uLDBw7X7I4ZC_PD1mat4D0d_pDW8/exec';

async function login() {
  const user = document.getElementById('user').value;
  const pass = document.getElementById('pass').value;
  const url = `${SCRIPT_URL}?action=login&username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`;
  try {
    const response = await fetch(url, { mode: 'cors' });
    const data = await response.json();
    document.getElementById('result').innerText = JSON.stringify(data);
    if (data.success) alert('✅ Umefanikiwa kuingia!');
    else alert('❌ Jina au nenosiri si sahihi');
  } catch(e) {
    alert('Hitilafu: ' + e.message);
  }
}
</script>
</body>
</html>
